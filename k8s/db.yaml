apiVersion: v1
kind: Secret
metadata:
  name: posts-db-secret
type: Opaque
stringData:
  DATABASE_URL: "postgres://admin:admin123@pgbouncer-service:6432/socialdb?sslmode=disable"
  POSTGRES_PASSWORD: "admin123"
  POSTGRES_EXPORTER_DSN: "postgresql://admin:admin123@localhost:5432/socialdb?sslmode=disable"

---
# ── pg_hba.conf ConfigMap ─────────────────────────────────────────────────────
# Mounted directly into Postgres — forces md5 for all host connections.
# This works even when the data directory already exists, unlike
# POSTGRES_HOST_AUTH_METHOD which only applies on first initdb.
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-hba
data:
  pg_hba.conf: |
    # TYPE  DATABASE   USER   ADDRESS        METHOD
    local   all        all                   trust
    host    all        all    127.0.0.1/32   md5
    host    all        all    ::1/128        md5
    host    all        all    0.0.0.0/0      md5

---
# ── Postgres headless Service ─────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: postgres
spec:
  clusterIP: None
  ports:
    - name: postgres
      port: 5432
  selector:
    app: postgres

---
# ── Postgres exporter Service ─────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: postgres-exporter
  labels:
    app: postgres
    component: exporter
spec:
  ports:
    - name: metrics
      port: 9187
      targetPort: 9187
  selector:
    app: postgres

---
# ── Postgres StatefulSet ──────────────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
spec:
  serviceName: "postgres"
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9187"
    spec:
      initContainers:
        - name: remove-stale-pid
          image: postgres:16
          command:
            - sh
            - -c
            - |
              rm -f /var/lib/postgresql/data/postmaster.pid
              rm -f /var/lib/postgresql/data/postmaster.opts
              echo "Init complete"
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data

      containers:
        - name: postgres
          image: postgres:16
          args:
            - -c
            - max_connections=100
            - -c
            - shared_buffers=256MB
            - -c
            - effective_cache_size=768MB
            - -c
            - work_mem=4MB
            - -c
            - maintenance_work_mem=64MB
            - -c
            - checkpoint_completion_target=0.9
            - -c
            - random_page_cost=1.1
            - -c
            - listen_addresses=*
            # Tell Postgres to use our mounted pg_hba.conf instead of
            # the one generated inside the data directory
            - -c
            - hba_file=/etc/postgres/pg_hba.conf
          env:
            - name: POSTGRES_DB
              value: "socialdb"
            - name: POSTGRES_USER
              value: "admin"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: posts-db-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_HOST_AUTH_METHOD
              value: "md5"
            - name: POSTGRES_INITDB_ARGS
              value: "--auth-host=md5 --auth-local=md5"
          ports:
            - containerPort: 5432
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "2Gi"
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
            - name: pg-hba
              mountPath: /etc/postgres
          startupProbe:
            exec:
              command: ["pg_isready", "-U", "admin", "-d", "socialdb"]
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "admin", "-d", "socialdb"]
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "admin", "-d", "socialdb"]
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3

        - name: postgres-exporter
          image: prometheuscommunity/postgres-exporter:v0.15.0
          env:
            - name: DATA_SOURCE_NAME
              valueFrom:
                secretKeyRef:
                  name: posts-db-secret
                  key: POSTGRES_EXPORTER_DSN
          ports:
            - name: metrics
              containerPort: 9187
          readinessProbe:
            httpGet:
              path: /metrics
              port: 9187
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /metrics
              port: 9187
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 5
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"

      volumes:
        - name: pg-hba
          configMap:
            name: postgres-hba

  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        storageClassName: standard
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi

---
# ── PgBouncer Deployment ──────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgbouncer
  labels:
    app: pgbouncer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pgbouncer
  template:
    metadata:
      labels:
        app: pgbouncer
    spec:
      initContainers:
        - name: wait-for-postgres
          image: postgres:16
          command:
            - sh
            - -c
            - |
              until pg_isready -h postgres-0.postgres.default.svc.cluster.local -p 5432 -U admin; do
                echo "Waiting for Postgres..."
                sleep 2
              done
              echo "Postgres is ready"

      containers:
        - name: pgbouncer
          image: edoburu/pgbouncer:v1.25.1-p0
          env:
            - name: DB_HOST
              value: "postgres-0.postgres.default.svc.cluster.local"
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              value: "admin"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: posts-db-secret
                  key: POSTGRES_PASSWORD
            - name: DB_NAME
              value: "socialdb"
            - name: LISTEN_PORT
              value: "6432"
            - name: POOL_MODE
              value: "transaction"
            - name: MAX_CLIENT_CONN
              value: "10000"
            - name: DEFAULT_POOL_SIZE
              value: "25"
            - name: MIN_POOL_SIZE
              value: "5"
            - name: RESERVE_POOL_SIZE
              value: "5"
            - name: RESERVE_POOL_TIMEOUT
              value: "3"
            - name: SERVER_IDLE_TIMEOUT
              value: "600"
            - name: AUTH_TYPE
              value: "md5"
            - name: LOG_CONNECTIONS
              value: "0"
            - name: LOG_DISCONNECTIONS
              value: "0"
          ports:
            - containerPort: 6432
              name: pgbouncer
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            tcpSocket:
              port: 6432
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 6432
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

---
# ── PgBouncer ClusterIP Service ───────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: pgbouncer-service
  labels:
    app: pgbouncer
spec:
  selector:
    app: pgbouncer
  ports:
    - name: pgbouncer
      port: 6432
      targetPort: 6432
  type: ClusterIP

---
# ── PodDisruptionBudget ───────────────────────────────────────────────────────
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: pgbouncer-pdb
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: pgbouncer

---
# ── ServiceMonitor ────────────────────────────────────────────────────────────
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: postgres-exporter
  namespace: monitoring
  labels:
    release: prometheus-operator
spec:
  namespaceSelector:
    matchNames:
      - default
  selector:
    matchLabels:
      app: postgres
      component: exporter
  endpoints:
    - port: metrics
      interval: 15s